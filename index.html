<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 文本处理工具箱</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">

    <header class="header">
      <h1>&#x1F58A;&#xFE0F; AI 文本处理工具箱</h1>
      <p class="subtitle">智能文本处理，一键搞定</p>
    </header>

    <nav class="tabs" role="tablist" aria-label="功能选择">
      <button class="tab active" role="tab" aria-selected="true" data-tool="summarize">&#x1F4DD; 总结提炼</button>
      <button class="tab" role="tab" aria-selected="false" data-tool="polish">&#x2728; 润色</button>
      <button class="tab" role="tab" aria-selected="false" data-tool="rewrite">&#x1F504; 缩写扩写</button>
      <button class="tab" role="tab" aria-selected="false" data-tool="translate">&#x1F310; 文档翻译</button>
    </nav>

    <main class="workspace">

      <section class="tool-panel active" id="panel-summarize" role="tabpanel">
        <div class="tool-description">将长文本提炼为简洁的摘要，快速抓住核心要点。</div>
      </section>

      <section class="tool-panel" id="panel-polish" role="tabpanel">
        <div class="tool-description">优化文本表达，提升文字质量和可读性。</div>
        <div class="options-bar">
          <label class="polish-req-label">润色要求：
            <input type="text" id="polish-requirement" placeholder="例如：更正式、学术风格、修正语法错误...">
          </label>
        </div>
      </section>

      <section class="tool-panel" id="panel-rewrite" role="tabpanel">
        <div class="tool-description">灵活调整文本长度，缩写精简或扩写丰富内容。</div>
        <div class="options-bar">
          <label>操作模式：
            <select id="rewrite-mode">
              <option value="shorten">缩写精简</option>
              <option value="expand">扩写丰富</option>
            </select>
          </label>
          <label>目标比例：
            <span id="rewrite-ratio-value">50%</span>
            <input type="range" id="rewrite-ratio" min="1" max="100" value="50" step="1">
          </label>
        </div>
      </section>

      <section class="tool-panel" id="panel-translate" role="tabpanel">
        <div class="tool-description">高质量多语言翻译，保留原文风格与语境。</div>
        <div class="options-bar">
          <label>源语言：
            <select id="translate-from">
              <option value="auto">自动检测</option>
              <option value="zh">中文</option>
              <option value="en">英文</option>
              <option value="ja">日文</option>
              <option value="ko">韩文</option>
              <option value="fr">法文</option>
              <option value="de">德文</option>
              <option value="es">西班牙文</option>
            </select>
          </label>
          <span class="arrow-icon">&#x27A1;&#xFE0F;</span>
          <label>目标语言：
            <select id="translate-to">
              <option value="en">英文</option>
              <option value="zh">中文</option>
              <option value="ja">日文</option>
              <option value="ko">韩文</option>
              <option value="fr">法文</option>
              <option value="de">德文</option>
              <option value="es">西班牙文</option>
            </select>
          </label>
        </div>
      </section>

      <!-- ========== 输入输出区域 ========== -->
      <div class="io-area">

        <!-- 左侧：输入列 -->
        <div class="io-column">
          <div class="io-header">
            <span>输入文本</span>
            <span class="char-count" id="input-count">0 字</span>
          </div>

          <div class="input-mode-tabs">
            <button class="input-mode-tab active" data-mode="text">&#x1F4DD; 粘贴文本</button>
            <button class="input-mode-tab" data-mode="file">&#x1F4CE; 上传文档</button>
          </div>

          <div class="input-mode active" id="mode-text">
            <textarea id="input-text" placeholder="在此粘贴或输入需要处理的文本..." aria-label="输入文本"></textarea>
          </div>

          <div class="input-mode" id="mode-file">
            <div class="upload-area" id="upload-area">
              <div class="upload-icon">&#x1F4C4;</div>
              <p class="upload-hint">点击或拖拽文件到此处上传</p>
              <p class="upload-formats">支持 .txt .md .docx</p>
              <input type="file" id="file-input" accept=".txt,.md,.docx" hidden>
            </div>
            <div class="file-info" id="file-info" hidden>
              <span class="file-name" id="file-name"></span>
              <button class="btn-secondary btn-remove-file" id="btn-remove-file" title="移除文件">&#x2715;</button>
            </div>
          </div>

          <div class="io-actions">
            <button class="btn-secondary" id="btn-paste" title="粘贴">&#x1F4CB; 粘贴</button>
            <button class="btn-secondary" id="btn-clear" title="清空">&#x1F5D1;&#xFE0F; 清空</button>
          </div>
        </div>

        <!-- 中间：处理按钮 -->
        <div class="io-divider">
          <button class="btn-primary" id="btn-process" aria-label="开始处理">
            <span class="btn-text">开始处理 &#x25B6;</span>
            <span class="btn-loading" hidden>处理中...</span>
          </button>
        </div>

        <!-- 右侧：输出列 -->
        <div class="io-column">
          <div class="io-header">
            <span>处理结果</span>
            <span class="char-count" id="output-count">0 字</span>
          </div>

          <!-- 文本结果模式 -->
          <div class="output-mode active" id="output-mode-text">
            <textarea id="output-text" placeholder="处理结果将显示在这里..." readonly aria-label="处理结果"></textarea>
            <div class="io-actions">
              <button class="btn-secondary" id="btn-copy" title="复制结果">&#x1F4C4; 复制</button>
            </div>
          </div>

          <!-- 文档下载模式 -->
          <div class="output-mode" id="output-mode-file">
            <div class="download-area" id="download-area">
              <div class="download-icon">&#x2705;</div>
              <p class="download-hint">文档处理完成</p>
              <p class="download-filename" id="download-filename"></p>
              <button class="btn-primary btn-download" id="btn-download">&#x1F4E5; 下载文档</button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="footer">
      <p>AI 文本处理工具箱 · 本地运行，数据安全</p>
    </footer>
  </div>

  <div class="toast" id="toast" hidden></div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
